name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS app
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Swift package
        run: swift test --package-path bins/slipkey-app --scratch-path target/slipkey-swift

      - name: Build Slipkey.app
        run: |
          set -euo pipefail
          APP_NAME="Slipkey"
          BUNDLE_ID="dev.zlb.imeswitch"
          VERSION="${GITHUB_REF_NAME#v}"
          SWIFT_SCRATCH="$PWD/target/slipkey-swift"
          APP_PATH="$PWD/dist/$APP_NAME.app"
          ZIP_PATH="$PWD/dist/$APP_NAME-$VERSION-macos-arm64.zip"

          swift build -c release --arch arm64 --package-path bins/slipkey-app --scratch-path "$SWIFT_SCRATCH"

          rm -rf "$APP_PATH"
          mkdir -p "$APP_PATH/Contents/MacOS" "$APP_PATH/Contents/Resources"
          cp bins/slipkey-app/Info.plist "$APP_PATH/Contents/Info.plist"
          cp "$SWIFT_SCRATCH/release/$APP_NAME" "$APP_PATH/Contents/MacOS/$APP_NAME"
          cp bins/slipkey-app/Resources/icon.icns "$APP_PATH/Contents/Resources/icon.icns"
          chmod +x "$APP_PATH/Contents/MacOS/$APP_NAME"

          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable $APP_NAME" "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$APP_PATH/Contents/Info.plist"

          xattr -cr "$APP_PATH" || true
          codesign --force --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          ditto -c -k --keepParent --noextattr --noqtn --norsrc "$APP_PATH" "$ZIP_PATH"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/Slipkey-*-macos-arm64.zip

  windows:
    name: Build Windows app
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The slipkey-windows build.rs preflight requires
      # bins/slipkey-windows/embed/slipkey_tsf.dll to exist before any cargo
      # action touches slipkey-windows — including `cargo test --workspace`.
      # So: helper DLL first, stage into embed/, then test, then release build.
      - name: Build helper DLL
        run: cargo build --release -p slipkey-tsf-helper --target x86_64-pc-windows-msvc

      - name: Stage helper DLL into embed/
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bins/slipkey-windows/embed | Out-Null
          Copy-Item `
            target/x86_64-pc-windows-msvc/release/slipkey_tsf_helper.dll `
            bins/slipkey-windows/embed/slipkey_tsf.dll `
            -Force

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Build Slipkey.exe (with embedded DLL)
        run: cargo build --release -p slipkey-windows --target x86_64-pc-windows-msvc

      - name: Package Windows artifact (single file)
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/Slipkey.exe dist/Slipkey.exe
          Compress-Archive `
            -Path dist/Slipkey.exe `
            -DestinationPath "dist/Slipkey-$version-windows-x64.zip" `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/Slipkey-*-windows-x64.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
